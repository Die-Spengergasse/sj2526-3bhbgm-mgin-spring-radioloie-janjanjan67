<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gerät auswählen</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h1>Reservierungsliste anzeigen</h1>
    <h3>Bitte ein Gerät auswählen:</h3>
    <div class="list-group">
        <a th:each="d : ${devices}" 
           th:href="@{'/reservation/list/' + ${d.id}}" 
           class="list-group-item">
            <h4 class="list-group-item-heading" th:text="${d.type + ' - ' + d.id}"></h4>
            <p class="list-group-item-text" th:text="'Raum: ' + ${d.location}"></p>
        </a>
    </div>
    <a href="/" class="btn btn-default">Zurück zum Menü</a>
</div>
</body>
</html>
